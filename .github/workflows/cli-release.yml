name: CLI Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/cli/**'

jobs:
  lint:
    name: Lint Scripts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck --severity=error install.sh
          shellcheck --severity=error kitup.sh

      - name: Lint PowerShell scripts
        shell: pwsh
        run: |
          $scripts = Get-ChildItem -Path *.ps1
          foreach ($script in $scripts) {
            $errors = Invoke-ScriptAnalyzer -Path $script.FullName
            if ($errors) {
              $errors | Format-Table
              exit 1
            }
          }

  test:
    name: Test Scripts
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/cli
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Test install script (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x install.sh kitup.sh
          bash -n install.sh
          bash -n kitup.sh

      - name: Test install script (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem -Path *.ps1
          Test-Path -Path install.ps1
          Test-Path -Path kitup.ps1

      - name: Test kitup --help (Unix)
        if: runner.os != 'Windows'
        run: |
          ./kitup.sh --help

      - name: Test kitup --list (Unix)
        if: runner.os != 'Windows'
        run: |
          ./kitup.sh --list

      - name: Test kitup --status (Unix)
        if: runner.os != 'Windows'
        run: |
          ./kitup.sh --status

  release:
    name: Create Release
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    defaults:
      run:
        working-directory: packages/cli
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate checksums
        run: |
          sha256sum install.sh > checksums.txt
          sha256sum kitup.sh >> checksums.txt
          sha256sum install.ps1 >> checksums.txt
          sha256sum kitup.ps1 >> checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            packages/cli/install.sh
            packages/cli/kitup.sh
            packages/cli/install.ps1
            packages/cli/kitup.ps1
            packages/cli/checksums.txt
          body: |
            ## kitup ${{ github.ref_name }}

            ### Installation

            **macOS / Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/packages/cli/install.sh | bash
            ```

            **Windows:**
            ```powershell
            irm https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/packages/cli/install.ps1 | iex
            ```

            ### Checksums
            ```
            ${{ steps.checksums.outputs.checksums }}
            ```
          generate_release_notes: true
